<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
  <defs>
    <!-- Midnight Fusion background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121424"/>
      <stop offset="100%" stop-color="#07080F"/>
    </linearGradient>
    <!-- Midnight Fusion accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Subtle drop shadow for the logo mark -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="1.2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background Card -->
  <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" fill="none" stroke="#2D314E" stroke-width="0.3"/>
  
  <!-- Logo Mark: <-Є -->
  <g filter="url(#shadow)">
    <!-- Arrow head and Crescent (using stroke) -->
    <g fill="none" stroke="url(#accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Arrow head -->
      <path d="M 9.5 6 L 4.5 12 L 9.5 18"/>
      <!-- Crescent -->
      <path d="M 19.5 6 c-3.5 0-6 2.5-6 6 s2.5 6 6 6"/>
    </g>
    <!-- Horizontal bar (using rect to prevent zero-height gradient rendering bug in librsvg) -->
    <rect x="4.5" y="11.1" width="15" height="1.8" rx="0.9" fill="url(#accent)"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Мягкая фоновая подсветка за эмблемой -->
    <radialGradient id="backlight" cx="20%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>

    <!-- Основной градиент 1 (Хром / Синий) -->
    <linearGradient id="fiber-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="60%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>

    <!-- Основной градиент 2 (Розовый / Фиолетовый / Индиго) -->
    <linearGradient id="fiber-purple" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Градиент золотого акцента -->
    <linearGradient id="gold-accent" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Градиент для платинового текста -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Мягкие радиальные свечения для узлов (взамен забагованных фильтров) -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="20%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="20%" stop-color="#fbbf24" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>

    <!-- Тень под наложенными лентами -->
    <filter id="ultra-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Темный фон для контраста -->
  <rect width="100%" height="100%" fill="#02040a" rx="32" stroke="#111827" stroke-width="1" />
  
  <!-- Свечение под эмблемой -->
  <rect width="100%" height="100%" fill="url(#backlight)" rx="32" />

  <!-- Группа эмблемы (слева, отмасштабирована) -->
  <g transform="translate(10, 5) scale(0.95)" filter="url(#ultra-shadow)">
    <!-- Parallel fibers for external arc -->
    <!-- Line 1 (Outer, thin) -->
    <path d="M 230,60 C 180,30 120,45 92,90 C 70,120 70,172 92,203 C 120,248 180,262 230,233" 
          fill="none" stroke="url(#fiber-cyan)" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    <!-- Line 2 (Central, thick) -->
    <path d="M 226,63 C 178,34 121,48 94,92 C 72,122 72,170 94,200 C 121,244 178,258 226,229" 
          fill="none" stroke="url(#fiber-cyan)" stroke-width="8" stroke-linecap="round" />
    <!-- Line 3 (Inner, thin) -->
    <path d="M 222,66 C 176,38 122,51 96,94 C 74,124 74,168 96,197 C 122,240 176,254 222,225" 
          fill="none" stroke="url(#fiber-cyan)" stroke-width="3" stroke-linecap="round" opacity="0.6" />

    <!-- Ribbon weave -->
    <path d="M 94,95 C 120,143 215,100 215,148 C 215,191 136,177 136,217" 
          fill="none" stroke="url(#fiber-purple)" stroke-width="8" stroke-linecap="round" />
    <path d="M 97,98 C 123,146 218,103 218,151 C 218,194 139,180 139,220" 
          fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />

    <!-- Central prong -->
    <path d="M 136,153 C 162,153 175,141 175,127 C 175,113 162,101 136,101" 
          fill="none" stroke="url(#gold-accent)" stroke-width="8" stroke-linecap="round" />

    <!-- Nodes / Light points (Glow fixed with radial gradients) -->
    <circle cx="226" cy="63" r="16" fill="url(#glow-cyan)" />
    <circle cx="226" cy="63" r="3.5" fill="#ffffff" />

    <circle cx="226" cy="229" r="16" fill="url(#glow-cyan)" />
    <circle cx="226" cy="229" r="3.5" fill="#ffffff" />

    <circle cx="175" cy="127" r="14" fill="url(#glow-gold)" />
    <circle cx="175" cy="127" r="2.5" fill="#ffffff" />
  </g>

  <!-- Текстовая группа (справа) -->
  <g xml:space="preserve">
    <!-- ЭВОКОД -->
    <text x="250" y="123" 
          fill="url(#text-grad)" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-weight="600" 
          font-size="56" 
          letter-spacing="12"
          filter="url(#ultra-shadow)">ЭВОКОД</text>

    <!-- Подзаголовок -->
    <text x="252" y="165" 
          fill="#475569" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-weight="600" 
          font-size="13" 
          letter-spacing="7">ИИ-СРЕДА РАЗРАБОТКИ</text>
  </g>
</svg>

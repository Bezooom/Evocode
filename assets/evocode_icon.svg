<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Эмбиент-подсветка на фоне (мягкое дорогое свечение) -->
    <radialGradient id="backlight" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.7"/> <!-- Deep Violet -->
      <stop offset="50%" stop-color="#0f172a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>

    <!-- Сверхтонкий градиент для фаски (стекло/металл) -->
    <linearGradient id="stroke-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="70%" stop-color="#a5b4fc" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.5" />
    </linearGradient>

    <!-- Основной градиент 1 (Хром / Синий) -->
    <linearGradient id="fiber-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="60%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>

    <!-- Основной градиент 2 (Розовый / Фиолетовый / Индиго) -->
    <linearGradient id="fiber-purple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="30%" stop-color="#b18bfd" />
      <stop offset="70%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Градиент для центрального лепестка -->
    <linearGradient id="gold-accent" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Мягкие радиальные свечения для узлов (взамен забагованных фильтров) -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="20%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="20%" stop-color="#fbbf24" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="20%" stop-color="#ec4899" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0" />
    </radialGradient>

    <!-- Тень под наложенными лентами -->
    <filter id="ultra-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ультра-черный матовый фон -->
  <rect width="512" height="512" fill="#02040a" rx="140" stroke="#111827" stroke-width="2" />
  
  <!-- Задняя подсветка -->
  <rect width="512" height="512" fill="url(#backlight)" rx="140" />

  <!-- Сложная геометрическая структура знака "Э" (Мастер-группа) -->
  <g transform="translate(10, 5)" filter="url(#ultra-shadow)">
    
    <!-- === Внешняя дуга: 3 параллельных световых волокна === -->
    <!-- Волокно 1 (Внешнее, тонкое) -->
    <path d="M 335,120 C 265,75 175,95 135,165 C 105,210 105,290 135,335 C 175,405 265,425 335,380" 
          fill="none" stroke="url(#fiber-cyan)" stroke-width="6" stroke-linecap="round" opacity="0.4" />
          
    <!-- Волокно 2 (Центральное, толстое) -->
    <path d="M 330,123 C 262,79 177,98 138,167 C 108,212 108,288 138,333 C 177,402 262,421 330,377" 
          fill="none" stroke="url(#fiber-cyan)" stroke-width="14" stroke-linecap="round" />
          
    <!-- Волокно 3 (Внутреннее, тонкое) -->
    <path d="M 325,126 C 259,83 179,101 141,169 C 111,214 111,286 141,331 C 179,399 259,417 325,374" 
          fill="none" stroke="url(#fiber-cyan)" stroke-width="6" stroke-linecap="round" opacity="0.6" />


    <!-- === Внутреннее переплетение (ДНК/Мёбиус) === -->
    <path d="M 143,172 C 178,235 305,185 305,248 C 305,305 200,285 200,342" 
          fill="none" stroke="url(#fiber-purple)" stroke-width="12" stroke-linecap="round" />
          
    <path d="M 148,177 C 183,240 310,190 310,253 C 310,310 205,290 205,347" 
          fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7" />


    <!-- === Центральный лепесток-акцент (Световой мост) === -->
    <path d="M 200,256 C 240,256 260,238 260,218 C 260,198 240,180 200,180" 
          fill="none" stroke="url(#gold-accent)" stroke-width="12" stroke-linecap="round" />


    <!-- === Световые Импульсы (Активные ноды на радиальных градиентах) === -->
    <!-- Верхний узел (Бирюзовый) -->
    <circle cx="330" cy="123" r="24" fill="url(#glow-cyan)" />
    <circle cx="330" cy="123" r="5" fill="#ffffff" />

    <!-- Нижний узел (Бирюзовый) -->
    <circle cx="330" cy="377" r="24" fill="url(#glow-cyan)" />
    <circle cx="330" cy="377" r="5" fill="#ffffff" />

    <!-- Центральный узел (Золотой) -->
    <circle cx="260" cy="218" r="22" fill="url(#glow-gold)" />
    <circle cx="260" cy="218" r="4.5" fill="#ffffff" />

    <!-- Узел на внутренней ленте (Розовый) -->
    <circle cx="200" cy="342" r="20" fill="url(#glow-pink)" />
    <circle cx="200" cy="342" r="4" fill="#ffffff" />
  </g>
</svg>

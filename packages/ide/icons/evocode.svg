<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121821"/>
      <stop offset="100%" stop-color="#0B0F14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- rounded square app icon -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="#1E293B" stroke-width="2"/>
  <!-- stylized Э as open ring + bar -->
  <g filter="url(#glow)" fill="none" stroke="url(#g)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 340 140
             C 220 140, 150 200, 150 256
             C 150 312, 220 372, 340 372"/>
    <path d="M 170 256 L 320 256"/>
  </g>
</svg>
